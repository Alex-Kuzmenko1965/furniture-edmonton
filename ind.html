		<!-- Основна сторінка сайту-->  
    <main>  
      <!-- Герой-->
      <section class="hero">
        <div class="hero__container">        
        <h1 class="hero__title">16 years in Canada 10 in Ukraine</h1>        
          <button type="button" class="btn link" data-modal-open>Order a service</button>          
        </div>
      </section> 
    </main>  
		<!-- Модальне вікно-->
    <div class="backdrop is-hidden" data-modal>
      <div class="modal">
        <p class="modal__heading">Залиште свої дані, ми вам передзвонимо</p>
        <form action="">
          <div class="modal__input-group">
            <label for="name" class="lab-form">Ім'я</label>
            <div class="modal__input-wrapper">
              <input type="text" class="modal__input" placeholder="" name="name" required autofocus>
              <svg width="18" height="18" class="modal__input-icon">
                <use href="./images/icons.svg#icon-person">
              </svg>
            </div>
          </div>
          <div class="modal__input-group">
            <label for="name" class="lab-form">Телефон</label>
            <div class="modal__input-wrapper">
              <input type="tel" class="modal__input" name="tel" required>
              <svg width="18" height="18" class="modal__input-icon">
                <use href="./images/icons.svg#icon-phone">
              </svg>
            </div>
          </div>
          <div class="modal__input-group">
            <label for="name" class="lab-form">Пошта</label>
            <div class="modal__input-wrapper">
              <input type="email" class="modal__input" placeholder="" name="email" required>
              <svg width="18" height="18" class="modal__input-icon">
                <use href="./images/icons.svg#icon-email">
              </svg>
            </div>
          </div>
          <div class="modal__input-group">
            <label for="coment" class="lab-form">Коментар</label>
            <textarea name="coment" id="coment" class="modal__text" placeholder="Введіть текст"></textarea>
          </div>
          <div class="center-checkbox">
            <div class="modal__checkbox">
              <label class="modal__conditions">
                <input type="checkbox" name="conditions" class="checkbox"><span class="checkbox__icon"></span>Погоджуюся з
                розсилкою та приймаю
              </label>
              <a href="" class="modal__umovi">Умови договору</a>
            </div>
          </div>
          <button type="submit" class="form-send-btn">Відправити</button>
        </form>
        <button type="button" class="modal__close" data-modal-close><svg width="18" height="18" class="close-icon">
            <use href="./images/icons.svg#icon-close"></use>
          </svg></button>
      </div>
    </div>
    <script src="./js/modal.js"></script>
		<!--Випадаюче меню-->

      <div class="mobile-menu">        
        <ul class="header__list list">

          <li class="header__item"><a href="" class="header__link link">Контакти</a></li>
        </ul>        
        
        <div class="mobile-menu__dop">
          <ul class="header__auth list">
            <li class="header__item"><a class="header__auth-tel link" href="tel:+380961111111">+38 096 111 11 11</a>
            </li>
            <li class="header__item">
              <a class="header__auth-mail link" href="mailto:info@devstudio.com">info@devstudio.com</a>
            </li>          
          </ul>

          <ul class="header__soc-list list">
            <li class="header__soc-item"><a href="#" class="header__soc-link link">
                <svg width="20" height="20" class="header__soc-icon">
                  <use href="./images/icons.svg#icon-instagram"></use>

              </a></li>
            <li class="header__soc-item"><a href="#" class="header__soc-link link">
                <svg width="20" height="20" class="header__soc-icon">
                  <use href="./images/icons.svg#icon-twitter"></use>
                </svg>
              </a></li>
            <li class="header__soc-item"><a href="#" class="header__soc-link link">
                <svg width="20" height="20" class="header__soc-icon">
                  <use href="./images/icons.svg#icon-facebook"></use>
                </svg>
              </a></li>
            <li class="header__soc-item"><a href="#" class="header__soc-link link">
                <svg width="20" height="20" class="header__soc-icon">
                  <use href="./images/icons.svg#icon-linkedin"></use>
                </svg>
              </a></li>
          </ul>
        </div>
      </div>
    </div>
